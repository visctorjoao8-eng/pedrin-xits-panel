databases:
  - name: pedrin-xits-db
    plan: free
    databaseName: pedrin_xits
    ipAllowList: []

services:
  - type: web
    name: pedrin-xits-panel
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: pedrin-xits-db
          property: connectionString
      - key: ADMIN_USERNAME
        value: "1"
      - key: ADMIN_PASSWORD
        value: "1"