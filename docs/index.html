<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedrin Xits — Auth Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="toast-container" id="toastContainer"></div>

  <!-- LOGIN -->
  <div class="login-container" id="loginPage">
    <div class="login-bg-grid"></div>
    <div class="login-box" id="loginBox">
      <div class="login-logo-wrap">
        <div class="login-icon">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="8" width="40" height="32" rx="6" stroke="url(#g1)" stroke-width="2.5"/>
            <path d="M16 20V16C16 11.5817 19.5817 8 24 8C28.4183 8 32 11.5817 32 16V20" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="24" cy="28" r="4" fill="url(#g1)"/>
            <path d="M24 32V36" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round"/>
            <defs>
              <linearGradient id="g1" x1="4" y1="8" x2="44" y2="40" gradientUnits="userSpaceOnUse">
                <stop stop-color="#818cf8"/>
                <stop offset="1" stop-color="#c084fc"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1 class="login-title">PEDRIN XITS</h1>
        <p class="login-subtitle">Painel Administrativo</p>
      </div>
      <div class="login-error" id="loginError"></div>
      <div class="input-group">
        <div class="input-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <input type="text" id="loginUser" placeholder="Usuário" autocomplete="username">
      </div>
      <div class="input-group">
        <div class="input-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <input type="password" id="loginPass" placeholder="Senha" autocomplete="current-password">
      </div>
      <button class="btn btn-primary btn-full btn-login" id="loginBtn">
        <span class="btn-text">Entrar</span>
        <span class="btn-loader" style="display:none">
          <svg class="spinner" width="20" height="20" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="31.4 31.4" stroke-linecap="round"/></svg>
        </span>
      </button>
    </div>
  </div>

  <!-- MAIN APP -->
  <div class="app-container" id="appContainer">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">
          <svg width="28" height="28" viewBox="0 0 48 48" fill="none">
            <rect x="4" y="8" width="40" height="32" rx="6" stroke="url(#g2)" stroke-width="2.5"/>
            <path d="M16 20V16C16 11.5817 19.5817 8 24 8C28.4183 8 32 11.5817 32 16V20" stroke="url(#g2)" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="24" cy="28" r="4" fill="url(#g2)"/>
            <path d="M24 32V36" stroke="url(#g2)" stroke-width="2.5" stroke-linecap="round"/>
            <defs>
              <linearGradient id="g2" x1="4" y1="8" x2="44" y2="40" gradientUnits="userSpaceOnUse">
                <stop stop-color="#818cf8"/>
                <stop offset="1" stop-color="#c084fc"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="brand-text">
          <h1>PEDRIN XITS</h1>
          <p>Auth Panel v2.0</p>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-item active" data-page="dashboard" data-nav="dashboard">
          <span class="nav-indicator"></span>
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="9" rx="1.5"/>
              <rect x="14" y="3" width="7" height="5" rx="1.5"/>
              <rect x="14" y="12" width="7" height="9" rx="1.5"/>
              <rect x="3" y="16" width="7" height="5" rx="1.5"/>
            </svg>
          </span>
          <span class="nav-label">Dashboard</span>
        </div>
        <div class="nav-item" data-page="keys" data-nav="keys">
          <span class="nav-indicator"></span>
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
            </svg>
          </span>
          <span class="nav-label">Licenças</span>
        </div>
        <div class="nav-item" data-page="logs" data-nav="logs">
          <span class="nav-indicator"></span>
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
              <polyline points="10 9 9 9 8 9"/>
            </svg>
          </span>
          <span class="nav-label">Logs</span>
        </div>
      </nav>

      <div class="sidebar-footer">
        <button class="logout-btn" id="logoutBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          <span>Sair</span>
        </button>
      </div>
    </aside>

    <!-- MOBILE HEADER -->
    <div class="mobile-header" id="mobileHeader">
      <button class="hamburger" id="hamburgerBtn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span class="mobile-title">PEDRIN XITS</span>
    </div>

    <!-- CONTENT -->
    <main class="content" id="contentArea"></main>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent"></div>
  </div>

  <!-- OVERLAY for mobile sidebar -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <script src="app.js"></script>
</body>
</html>
